name: Build macOS App

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: npm install

      - name: Build app
        run: npm run build

      - name: Zip macOS app
        run: |
          cd src-tauri/target/release/bundle/macos
          zip -r /tmp/Sleems-Tasks-macOS.zip "Sleem's Tasks.app"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Sleems-Tasks-macOS
          path: /tmp/Sleems-Tasks-macOS.zip
